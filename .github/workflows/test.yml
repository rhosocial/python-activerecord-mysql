# .github/workflows/test.yml
name: Python Test and Coverage with MySQL

on:
  push:
    branches:
      - main
      - 'release/v**'
      - 'maint/**'
  pull_request:
    branches:
      - main
      - 'release/v**'
      - 'maint/**'

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }} / MySQL ${{ matrix.mysql-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { python-version: '3.8', mysql-version: '8.0', port: 3306 }
          - { python-version: '3.9', mysql-version: '8.0', port: 3307 }
          - { python-version: '3.10', mysql-version: '8.4', port: 3308 }
          - { python-version: '3.11', mysql-version: '8.4', port: 3309 }
          - { python-version: '3.12', mysql-version: '9.0', port: 3310 }
          - { python-version: '3.13', mysql-version: '9.1', port: 3311 }
          - { python-version: '3.14', mysql-version: '9.2', port: 3312 }
          - { python-version: '3.13t', mysql-version: '9.3', port: 3313 }
          - { python-version: '3.14t', mysql-version: '9.4', port: 3314 }
          - { python-version: '3.14', mysql-version: '9.5', port: 3315 }
          - { python-version: '3.14t', mysql-version: '9.6', port: 3316 }

    services:
      mysql:
        image: mysql:${{ matrix.mysql-version }}
        env:
          MYSQL_ROOT_PASSWORD: password
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -u root -ppassword"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - ${{ matrix.port }}:3306

    steps:
      - name: Check out the repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Install activerecord and testsuite from PyPI/git
        run: |
          pip install git+https://github.com/rhosocial/python-activerecord.git@release/v1.0.0.dev26#egg=rhosocial-activerecord
          pip install git+https://github.com/rhosocial/python-activerecord-testsuite.git@release/v1.0.0.dev13#egg=rhosocial-activerecord-testsuite

      - name: Create and test database
        run: |
          pip install mysql-connector-python
          python -c "
          import mysql.connector
          conn = mysql.connector.connect(
              host='127.0.0.1',
              port=${{ matrix.port }},
              user='root',
              password='password',
              ssl_disabled=True
          )
          cursor = conn.cursor()
          cursor.execute('CREATE DATABASE IF NOT EXISTS test_db')
          cursor.execute('SELECT NOW()')
          result = cursor.fetchone()
          print('MySQL ${{ matrix.mysql-version }} connectivity test passed - Current time:', result[0])
          cursor.close()
          conn.close()
          "

      - name: Create MySQL scenario config
        run: |
          cat > mysql_scenarios.yaml << EOF
          scenarios:
            mysql_default:
              host: 127.0.0.1
              port: ${{ matrix.port }}
              database: test_db
              username: root
              password: password
              charset: utf8mb4
              autocommit: true
          EOF
          echo "MYSQL_SCENARIOS_CONFIG_PATH=$(pwd)/mysql_scenarios.yaml" >> $GITHUB_ENV

      - name: Run tests (skip for MySQL 9.6)
        if: matrix.mysql-version != '9.6'
        run: |
          export PYTHONPATH=src:tests
          python -m pytest tests/ --tb=short

      - name: Run tests with coverage (only for MySQL 9.6)
        if: matrix.mysql-version == '9.6'
        run: |
          export PYTHONPATH=src:tests
          pip install codecov
          coverage run --source=src -m pytest tests/ --tb=short
          coverage xml
          coverage report

      - name: Upload coverage to Codecov
        if: matrix.mysql-version == '9.6'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unittests,python-${{ matrix.python-version }},mysql-${{ matrix.mysql-version }}
          name: codecov-mysql-${{ matrix.python-version }}-${{ matrix.mysql-version }}
          fail_ci_if_error: false